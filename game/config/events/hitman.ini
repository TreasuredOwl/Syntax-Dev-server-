# ---------------------------------------------------------------------------
# Hitman Event Settings
# ---------------------------------------------------------------------------
# Enable the Hitman event system
# Default: False
HitmanEnabled = True

# Do assassins receive karma when killing a target?
# Default: True
HitmanTakeKarma = False

# Maximum number of contracts each player can create
# Default: 5
HitmanTargetsLimit = 5

# Announce to server when someone places a bounty?
# Default: False
HitmanAnnounce = False

# Maximum number of targets displayed per page in the list
# Default: 20
HitmanMaxPerPage = 20

# Accepted items for bounty payment (comma-separated item IDs)
# Adena = 57
# Coin of Luck = 4037
# Life Stone = 9143
# Default: 57,3470
HitmanCurrency = 57,3470

# Minimum bounty amount required to place a contract
# Default: 100000
HitmanMinBounty = 100000

# Allow assassinations on members of the same Clan/Ally?
# Default: False
HitmanSameTeam = False

# Interval in minutes to save the target list to database
# Default: 15
HitmanSaveInterval = 15
