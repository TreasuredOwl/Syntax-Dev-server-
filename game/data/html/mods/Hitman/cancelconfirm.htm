<html noscrollbar>
	<body>
	<br>
	<center>
	<table width=750>
		<tr>
			<td align=center>
				<font color="LEVEL">Hitman - Cancel Contract</font><br1>
				<font color="FF0000">Are you sure you want to cancel this contract?</font>
			</td>
		</tr>
	</table>
	<br1>
		<img src="L2UI.Squaregray" width="400" height="1">
	<br1>
	<table width=400 bgcolor="1b1b1b">
		<tr>
			<td align=center>
				<font color="FFCC00">Cancellation Confirmation</font>
			</td>
		</tr>
	</table>
	<br1>
		<img src="L2UI.Squaregray" width="400" height="1">
	<br>
	<table width=400>
		<tr>
			<td align=center>
				<font color="999999">You are about to cancel the contract on:</font><br>
				<font color="LEVEL" size=+1>%targetName%</font><br><br>
				<font color="FF6600">WARNING: You will NOT receive a refund!</font>
			</td>
		</tr>
	</table>
	<br>
		<img src="L2UI.Squaregray" width="600" height="1">
	<br>
	<table width=250>
		<tr>
			<td align=center>
				<button value="Confirm Cancel" action="bypass -h hitman_cancelconfirm %targetName%" width=110 height=25 back="L2UI_ct1.button_df" fore="L2UI_ct1.button_df"/>
			</td>
			<td align=center>
				<button value="Go Back" action="bypass -h hitman_mycontracts" width=110 height=25 back="L2UI_ct1.button_df" fore="L2UI_ct1.button_df"/>
			</td>
		</tr>
	</table>
	</center>
	</body>
</html>
